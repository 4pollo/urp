<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 - URP 权限管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-primary: #0a0a0a;
            --color-bg-secondary: #141414;
            --color-bg-tertiary: #1f1f1f;
            --color-surface: #2a2a2a;
            --color-border: #333333;
            --color-border-light: #404040;
            --color-text-primary: #ffffff;
            --color-text-secondary: #a3a3a3;
            --color-text-tertiary: #737373;
            --color-accent: #ffffff;
            --color-accent-hover: #e5e5e5;
            --spacing-unit: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--color-bg-primary);
            min-height: 100vh;
            color: var(--color-text-primary);
        }

        .header {
            background: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border);
            padding: calc(var(--spacing-unit) * 3) 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 calc(var(--spacing-unit) * 4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--color-text-primary);
            text-transform: uppercase;
        }

        .nav {
            display: flex;
            gap: calc(var(--spacing-unit) * 4);
            align-items: center;
        }

        .nav a {
            color: var(--color-text-tertiary);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            transition: color 0.2s ease;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            position: relative;
        }

        .nav a:hover, .nav a.active {
            color: var(--color-text-primary);
        }

        .nav a.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--color-text-primary);
        }

        .logout-btn {
            padding: calc(var(--spacing-unit) * 1) calc(var(--spacing-unit) * 2);
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: 1px;
            color: var(--color-text-secondary);
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .logout-btn:hover {
            background: var(--color-bg-tertiary);
            border-color: var(--color-border-light);
            color: var(--color-text-primary);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: calc(var(--spacing-unit) * 8) calc(var(--spacing-unit) * 4);
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 48px;
            font-weight: 800;
            margin-bottom: calc(var(--spacing-unit) * 1);
            letter-spacing: -0.03em;
            text-transform: uppercase;
        }

        .page-subtitle {
            font-size: 12px;
            color: var(--color-text-tertiary);
            margin-bottom: calc(var(--spacing-unit) * 6);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .tabs {
            display: flex;
            gap: calc(var(--spacing-unit) * 1);
            margin-bottom: calc(var(--spacing-unit) * 4);
            border-bottom: 1px solid var(--color-border);
        }

        .tab {
            padding: calc(var(--spacing-unit) * 2) calc(var(--spacing-unit) * 3);
            background: transparent;
            border: none;
            color: var(--color-text-tertiary);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .tab:hover {
            color: var(--color-text-primary);
        }

        .tab.active {
            color: var(--color-text-primary);
            border-bottom-color: var(--color-text-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 2px;
            padding: calc(var(--spacing-unit) * 4);
            margin-bottom: calc(var(--spacing-unit) * 3);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: calc(var(--spacing-unit) * 2);
            font-size: 10px;
            font-weight: 600;
            color: var(--color-text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--color-border);
        }

        td {
            padding: calc(var(--spacing-unit) * 2);
            font-size: 12px;
            color: var(--color-text-primary);
            border-bottom: 1px solid var(--color-border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: var(--color-bg-tertiary);
        }

        .badge {
            display: inline-block;
            padding: calc(var(--spacing-unit) * 0.5) calc(var(--spacing-unit) * 1.5);
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border);
            border-radius: 1px;
            color: var(--color-text-primary);
            font-size: 10px;
            font-weight: 600;
            margin-right: calc(var(--spacing-unit) * 1);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge.success {
            background: var(--color-text-primary);
            border-color: var(--color-text-primary);
            color: var(--color-bg-primary);
        }

        .badge.danger {
            background: var(--color-bg-primary);
            border-color: var(--color-border-light);
            color: var(--color-text-secondary);
        }

        .btn {
            padding: calc(var(--spacing-unit) * 1) calc(var(--spacing-unit) * 2);
            background: transparent;
            border: 1px solid var(--color-border);
            border-radius: 1px;
            color: var(--color-text-secondary);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'IBM Plex Mono', monospace;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--color-bg-tertiary);
            border-color: var(--color-border-light);
            color: var(--color-text-primary);
        }

        .btn-danger {
            border-color: var(--color-border);
            color: var(--color-text-tertiary);
        }

        .btn-danger:hover {
            background: var(--color-text-primary);
            border-color: var(--color-text-primary);
            color: var(--color-bg-primary);
        }

        .btn-group {
            display: flex;
            gap: calc(var(--spacing-unit) * 1);
        }

        .empty-state {
            text-align: center;
            padding: calc(var(--spacing-unit) * 8) calc(var(--spacing-unit) * 3);
            color: var(--color-text-tertiary);
            font-size: 11px;
            letter-spacing: 0.05em;
        }

        .loading {
            text-align: center;
            padding: calc(var(--spacing-unit) * 8) calc(var(--spacing-unit) * 3);
            color: var(--color-text-tertiary);
            font-size: 11px;
            letter-spacing: 0.05em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: calc(var(--spacing-unit) * 3);
            margin-bottom: calc(var(--spacing-unit) * 4);
        }

        .stat-card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 2px;
            padding: calc(var(--spacing-unit) * 3);
            position: relative;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--color-border-light);
            transform: translateY(-2px);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-label {
            font-size: 10px;
            color: var(--color-text-tertiary);
            font-weight: 600;
            margin-bottom: calc(var(--spacing-unit) * 2);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 36px;
            font-weight: 800;
            color: var(--color-text-primary);
            letter-spacing: -0.02em;
        }

        .code {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: var(--color-text-secondary);
            background: var(--color-bg-primary);
            padding: calc(var(--spacing-unit) * 0.5) calc(var(--spacing-unit) * 1);
            border-radius: 1px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">URP</div>
            <div class="nav">
                <a href="/demo/dashboard.html">用户面板</a>
                <a href="/demo/admin.html" class="active">管理面板</a>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-title">管理面板</div>
        <div class="page-subtitle">管理用户、角色和权限</div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">总用户数</div>
                <div class="stat-value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总角色数</div>
                <div class="stat-value" id="totalRoles">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总权限数</div>
                <div class="stat-value" id="totalPermissions">-</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('users')">用户管理</button>
            <button class="tab" onclick="switchTab('roles')">角色管理</button>
            <button class="tab" onclick="switchTab('permissions')">权限管理</button>
        </div>

        <div id="users" class="tab-content active">
            <div class="card">
                <div class="table-container">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>邮箱</th>
                                <th>状态</th>
                                <th>角色</th>
                                <th>最后登录</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="6" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="roles" class="tab-content">
            <div class="card">
                <div class="table-container">
                    <table id="rolesTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>角色名</th>
                                <th>描述</th>
                                <th>权限数量</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="rolesTableBody">
                            <tr><td colspan="6" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="permissions" class="tab-content">
            <div class="card">
                <div class="table-container">
                    <table id="permissionsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>权限标识</th>
                                <th>分组</th>
                                <th>描述</th>
                                <th>创建时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="permissionsTableBody">
                            <tr><td colspan="6" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/demo/login.html';
        }

        // 验证 SuperAdmin 权限
        async function checkAdminPermission() {
            try {
                const response = await fetch('http://localhost:3000/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.code === 0) {
                    const user = result.data;
                    const isSuperAdmin = user.roles.some(role => role.name === 'SuperAdmin');

                    if (!isSuperAdmin) {
                        alert('访问被拒绝：您没有管理员权限');
                        window.location.href = '/demo/dashboard.html';
                        return false;
                    }
                    return true;
                } else {
                    localStorage.clear();
                    window.location.href = '/demo/login.html';
                    return false;
                }
            } catch (error) {
                console.error('权限验证失败:', error);
                window.location.href = '/demo/login.html';
                return false;
            }
        }

        // 页面加载时验证权限
        checkAdminPermission();

        let currentTab = 'users';

        function switchTab(tab) {
            currentTab = tab;

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');

            if (tab === 'users') loadUsers();
            if (tab === 'roles') loadRoles();
            if (tab === 'permissions') loadPermissions();
        }

        async function loadUsers() {
            try {
                const response = await fetch('http://localhost:3000/api/users?page=1&limit=100', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.code === 0) {
                    const tbody = document.getElementById('usersTableBody');

                    if (result.data.items.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无用户</td></tr>';
                        return;
                    }

                    tbody.innerHTML = result.data.items.map(user => `
                        <tr>
                            <td>${user.id}</td>
                            <td>${user.email}</td>
                            <td><span class="badge ${user.status === 'active' ? 'success' : 'danger'}">${user.status === 'active' ? '正常' : '冻结'}</span></td>
                            <td>${user.roles.map(r => `<span class="badge">${r.name}</span>`).join(' ')}</td>
                            <td>${user.lastLoginAt ? new Date(user.lastLoginAt).toLocaleString('zh-CN') : '-'}</td>
                            <td>
                                <div class="btn-group">
                                    <button class="btn" onclick="toggleUserStatus(${user.id}, '${user.status}')">
                                        ${user.status === 'active' ? '冻结' : '激活'}
                                    </button>
                                    <button class="btn btn-danger" onclick="deleteUser(${user.id}, '${user.email}')">删除</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');

                    document.getElementById('totalUsers').textContent = result.data.total;
                }
            } catch (error) {
                console.error('加载用户失败:', error);
            }
        }

        async function loadRoles() {
            try {
                const response = await fetch('http://localhost:3000/api/roles', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.code === 0) {
                    const tbody = document.getElementById('rolesTableBody');

                    if (result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无角色</td></tr>';
                        return;
                    }

                    tbody.innerHTML = result.data.map(role => `
                        <tr>
                            <td>${role.id}</td>
                            <td><span class="badge">${role.name}</span></td>
                            <td>${role.description || '-'}</td>
                            <td>${role.permissionCount}</td>
                            <td>${new Date(role.createdAt).toLocaleString('zh-CN')}</td>
                            <td>
                                <div class="btn-group">
                                    <button class="btn" onclick="editRole(${role.id}, '${role.name}', '${role.description || ''}')">编辑</button>
                                    <button class="btn btn-danger" onclick="deleteRole(${role.id}, '${role.name}')">删除</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');

                    document.getElementById('totalRoles').textContent = result.data.length;
                }
            } catch (error) {
                console.error('加载角色失败:', error);
            }
        }

        async function loadPermissions() {
            try {
                const response = await fetch('http://localhost:3000/api/permissions', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.code === 0) {
                    const tbody = document.getElementById('permissionsTableBody');

                    if (result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无权限</td></tr>';
                        return;
                    }

                    tbody.innerHTML = result.data.map(perm => `
                        <tr>
                            <td>${perm.id}</td>
                            <td><span class="code">${perm.key}</span></td>
                            <td><span class="badge">${perm.group}</span></td>
                            <td>${perm.description || '-'}</td>
                            <td>${new Date(perm.createdAt).toLocaleString('zh-CN')}</td>
                            <td>
                                <div class="btn-group">
                                    <button class="btn" onclick="editPermission(${perm.id}, '${perm.key}', '${perm.group}', '${perm.description || ''}')">编辑</button>
                                    <button class="btn btn-danger" onclick="deletePermission(${perm.id}, '${perm.key}')">删除</button>
                                </div>
                            </td>
                        </tr>
                    `).join('');

                    document.getElementById('totalPermissions').textContent = result.data.length;
                }
            } catch (error) {
                console.error('加载权限失败:', error);
            }
        }

        async function toggleUserStatus(userId, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'frozen' : 'active';

            try {
                const response = await fetch(`http://localhost:3000/api/users/${userId}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                const result = await response.json();

                if (result.code === 0) {
                    alert('操作成功');
                    loadUsers();
                } else {
                    alert('操作失败: ' + result.message);
                }
            } catch (error) {
                alert('操作失败');
            }
        }

        // 删除用户
        async function deleteUser(userId, email) {
            if (!confirm(`确定要删除用户 "${email}" 吗？此操作不可恢复。`)) return;

            try {
                const response = await fetch(`http://localhost:3000/api/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const result = await response.json();

                if (result.code === 0) {
                    alert('用户删除成功');
                    loadUsers();
                } else {
                    alert('删除失败: ' + result.message);
                }
            } catch (error) {
                alert('删除失败');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/demo/login.html';
        }

        // 编辑角色
        async function editRole(id, name, description) {
            const newName = prompt('编辑角色名称:', name);
            if (!newName || newName === name) return;

            const newDescription = prompt('编辑角色描述:', description);

            try {
                const response = await fetch(`http://localhost:3000/api/roles/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: newName,
                        description: newDescription || description
                    })
                });

                const result = await response.json();

                if (result.code === 0) {
                    alert('角色更新成功');
                    loadRoles();
                } else {
                    alert('更新失败: ' + result.message);
                }
            } catch (error) {
                alert('更新失败');
            }
        }

        // 删除角色
        async function deleteRole(id, name) {
            if (!confirm(`确定要删除角色 "${name}" 吗？此操作不可恢复。`)) return;

            try {
                const response = await fetch(`http://localhost:3000/api/roles/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const result = await response.json();

                if (result.code === 0) {
                    alert('角色删除成功');
                    loadRoles();
                } else {
                    alert('删除失败: ' + result.message);
                }
            } catch (error) {
                alert('删除失败');
            }
        }

        // 编辑权限
        async function editPermission(id, key, group, description) {
            const newKey = prompt('编辑权限标识 (格式: resource:action):', key);
            if (!newKey || newKey === key) return;

            const newGroup = prompt('编辑权限分组:', group);
            const newDescription = prompt('编辑权限描述:', description);

            try {
                const response = await fetch(`http://localhost:3000/api/permissions/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        key: newKey,
                        group: newGroup || group,
                        description: newDescription || description
                    })
                });

                const result = await response.json();

                if (result.code === 0) {
                    alert('权限更新成功');
                    loadPermissions();
                } else {
                    alert('更新失败: ' + result.message);
                }
            } catch (error) {
                alert('更新失败');
            }
        }

        // 删除权限
        async function deletePermission(id, key) {
            if (!confirm(`确定要删除权限 "${key}" 吗？此操作不可恢复。`)) return;

            try {
                const response = await fetch(`http://localhost:3000/api/permissions/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const result = await response.json();

                if (result.code === 0) {
                    alert('权限删除成功');
                    loadPermissions();
                } else {
                    alert('删除失败: ' + result.message);
                }
            } catch (error) {
                alert('删除失败');
            }
        }

        // 初始加载
        loadUsers();
        loadRoles();
        loadPermissions();
    </script>
</body>
</html>
