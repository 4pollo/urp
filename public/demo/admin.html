<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 - URP 权限管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: #e8e8e8;
        }

        .header {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 0;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Crimson Pro', serif;
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav a:hover, .nav a.active {
            color: #a78bfa;
        }

        .logout-btn {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            color: #fca5a5;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 48px 24px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title {
            font-family: 'Crimson Pro', serif;
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 40px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: #888;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
            font-family: 'DM Sans', sans-serif;
        }

        .tab:hover {
            color: #a78bfa;
        }

        .tab.active {
            color: #a78bfa;
            border-bottom-color: #8b5cf6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            font-size: 13px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        td {
            padding: 16px;
            font-size: 14px;
            color: #e8e8e8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            color: #a78bfa;
            font-size: 12px;
            font-weight: 500;
        }

        .badge.success {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .badge.danger {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .btn {
            padding: 8px 16px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 6px;
            color: #a78bfa;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'DM Sans', sans-serif;
        }

        .btn:hover {
            background: rgba(139, 92, 246, 0.25);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: #666;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 64px 24px;
            color: #888;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
        }

        .stat-label {
            font-size: 13px;
            color: #888;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #e8e8e8;
        }

        .code {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #a78bfa;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">URP</div>
            <div class="nav">
                <a href="/demo/dashboard.html">用户面板</a>
                <a href="/demo/admin.html" class="active">管理面板</a>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-title">管理面板</div>
        <div class="page-subtitle">管理用户、角色和权限</div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">总用户数</div>
                <div class="stat-value" id="totalUsers">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总角色数</div>
                <div class="stat-value" id="totalRoles">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总权限数</div>
                <div class="stat-value" id="totalPermissions">-</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('users')">用户管理</button>
            <button class="tab" onclick="switchTab('roles')">角色管理</button>
            <button class="tab" onclick="switchTab('permissions')">权限管理</button>
        </div>

        <div id="users" class="tab-content active">
            <div class="card">
                <div class="table-container">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>邮箱</th>
                                <th>状态</th>
                                <th>角色</th>
                                <th>最后登录</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="6" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="roles" class="tab-content">
            <div class="card">
                <div class="table-container">
                    <table id="rolesTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>角色名</th>
                                <th>描述</th>
                                <th>权限数量</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody id="rolesTableBody">
                            <tr><td colspan="5" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="permissions" class="tab-content">
            <div class="card">
                <div class="table-container">
                    <table id="permissionsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>权限标识</th>
                                <th>分组</th>
                                <th>描述</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody id="permissionsTableBody">
                            <tr><td colspan="5" class="loading">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/demo/login.html';
        }

        // 验证 SuperAdmin 权限
        async function checkAdminPermission() {
            try {
                const response = await fetch('http://localhost:3000/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.code === 0) {
                    const user = result.data;
                    const isSuperAdmin = user.roles.some(role => role.name === 'SuperAdmin');

                    if (!isSuperAdmin) {
                        alert('访问被拒绝：您没有管理员权限');
                        window.location.href = '/demo/dashboard.html';
                        return false;
                    }
                    return true;
                } else {
                    localStorage.clear();
                    window.location.href = '/demo/login.html';
                    return false;
                }
            } catch (error) {
                console.error('权限验证失败:', error);
                window.location.href = '/demo/login.html';
                return false;
            }
        }

        // 页面加载时验证权限
        checkAdminPermission();

        let currentTab = 'users';

        function switchTab(tab) {
            currentTab = tab;

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');

            if (tab === 'users') loadUsers();
            if (tab === 'roles') loadRoles();
            if (tab === 'permissions') loadPermissions();
        }

        async function loadUsers() {
            try {
                const response = await fetch('http://localhost:3000/api/users?page=1&pageSize=100', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.code === 0) {
                    const tbody = document.getElementById('usersTableBody');

                    if (result.data.items.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无用户</td></tr>';
                        return;
                    }

                    tbody.innerHTML = result.data.items.map(user => `
                        <tr>
                            <td>${user.id}</td>
                            <td>${user.email}</td>
                            <td><span class="badge ${user.status === 'active' ? 'success' : 'danger'}">${user.status === 'active' ? '正常' : '冻结'}</span></td>
                            <td>${user.roles.map(r => `<span class="badge">${r.name}</span>`).join(' ')}</td>
                            <td>${user.lastLoginAt ? new Date(user.lastLoginAt).toLocaleString('zh-CN') : '-'}</td>
                            <td>
                                <div class="btn-group">
                                    <button class="btn btn-danger" onclick="toggleUserStatus(${user.id}, '${user.status}')">
                                        ${user.status === 'active' ? '冻结' : '激活'}
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `).join('');

                    document.getElementById('totalUsers').textContent = result.data.total;
                }
            } catch (error) {
                console.error('加载用户失败:', error);
            }
        }

        async function loadRoles() {
            try {
                const response = await fetch('http://localhost:3000/api/roles', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.code === 0) {
                    const tbody = document.getElementById('rolesTableBody');

                    if (result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">暂无角色</td></tr>';
                        return;
                    }

                    tbody.innerHTML = result.data.map(role => `
                        <tr>
                            <td>${role.id}</td>
                            <td><span class="badge">${role.name}</span></td>
                            <td>${role.description || '-'}</td>
                            <td>${role.permissionCount}</td>
                            <td>${new Date(role.createdAt).toLocaleString('zh-CN')}</td>
                        </tr>
                    `).join('');

                    document.getElementById('totalRoles').textContent = result.data.length;
                }
            } catch (error) {
                console.error('加载角色失败:', error);
            }
        }

        async function loadPermissions() {
            try {
                const response = await fetch('http://localhost:3000/api/permissions', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const result = await response.json();

                if (result.code === 0) {
                    const tbody = document.getElementById('permissionsTableBody');

                    if (result.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">暂无权限</td></tr>';
                        return;
                    }

                    tbody.innerHTML = result.data.map(perm => `
                        <tr>
                            <td>${perm.id}</td>
                            <td><span class="code">${perm.key}</span></td>
                            <td><span class="badge">${perm.group}</span></td>
                            <td>${perm.description || '-'}</td>
                            <td>${new Date(perm.createdAt).toLocaleString('zh-CN')}</td>
                        </tr>
                    `).join('');

                    document.getElementById('totalPermissions').textContent = result.data.length;
                }
            } catch (error) {
                console.error('加载权限失败:', error);
            }
        }

        async function toggleUserStatus(userId, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'frozen' : 'active';

            try {
                const response = await fetch(`http://localhost:3000/api/users/${userId}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                const result = await response.json();

                if (result.code === 0) {
                    alert('操作成功');
                    loadUsers();
                } else {
                    alert('操作失败: ' + result.message);
                }
            } catch (error) {
                alert('操作失败');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/demo/login.html';
        }

        // 初始加载
        loadUsers();
        loadRoles();
        loadPermissions();
    </script>
</body>
</html>
