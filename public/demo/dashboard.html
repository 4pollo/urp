<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户面板 - URP 权限管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            min-height: 100vh;
            color: #e8e8e8;
        }

        .header {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 0;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Crimson Pro', serif;
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav {
            display: flex;
            gap: 24px;
            align-items: center;
        }

        .nav a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav a:hover, .nav a.active {
            color: #a78bfa;
        }

        .logout-btn {
            padding: 8px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            color: #fca5a5;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title {
            font-family: 'Crimson Pro', serif;
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .page-subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 32px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(139, 92, 246, 0.3);
            transform: translateY(-2px);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 700;
            color: #e8e8e8;
            margin-bottom: 8px;
        }

        .card-label {
            font-size: 14px;
            color: #666;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-size: 14px;
            color: #888;
            font-weight: 500;
        }

        .info-value {
            font-size: 14px;
            color: #e8e8e8;
            font-weight: 500;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            color: #a78bfa;
            font-size: 13px;
            font-weight: 500;
            margin-right: 8px;
            margin-bottom: 8px;
        }

        .badge.success {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.3);
            color: #86efac;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #666;
            font-size: 14px;
        }

        .permission-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }

        .permission-item {
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            font-size: 13px;
            color: #b8b8b8;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">URP</div>
            <div class="nav">
                <a href="/demo/dashboard.html" class="active">用户面板</a>
                <a href="/demo/admin.html" id="adminLink" style="display: none;">管理面板</a>
                <button class="logout-btn" onclick="logout()">退出登录</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="page-title">用户面板</div>
        <div class="page-subtitle">查看您的账户信息和权限</div>

        <div class="grid">
            <div class="card">
                <div class="card-title">账户信息</div>
                <div class="info-row">
                    <div class="info-label">邮箱</div>
                    <div class="info-value" id="userEmail">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label">状态</div>
                    <div class="info-value"><span class="badge success" id="userStatus">-</span></div>
                </div>
                <div class="info-row">
                    <div class="info-label">最后登录</div>
                    <div class="info-value" id="lastLogin">-</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">角色信息</div>
                <div id="rolesContainer">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">我的权限</div>
            <div id="permissionsContainer">
                <div class="empty-state">加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 检查登录状态
        const token = localStorage.getItem('accessToken');
        if (!token) {
            window.location.href = '/demo/login.html';
        }

        async function fetchUserInfo() {
            try {
                const response = await fetch('http://localhost:3000/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const result = await response.json();

                if (result.code === 0) {
                    const user = result.data;

                    document.getElementById('userEmail').textContent = user.email;
                    document.getElementById('userStatus').textContent = user.status === 'active' ? '正常' : '冻结';

                    if (user.lastLoginAt) {
                        const date = new Date(user.lastLoginAt);
                        document.getElementById('lastLogin').textContent = date.toLocaleString('zh-CN');
                    } else {
                        document.getElementById('lastLogin').textContent = '首次登录';
                    }

                    // 显示角色
                    const rolesContainer = document.getElementById('rolesContainer');
                    if (user.roles && user.roles.length > 0) {
                        rolesContainer.innerHTML = user.roles.map(role =>
                            `<span class="badge">${role.name}</span>`
                        ).join('');

                        // 如果有 SuperAdmin 角色，显示管理面板链接
                        if (user.roles.some(r => r.name === 'SuperAdmin')) {
                            document.getElementById('adminLink').style.display = 'block';
                        }
                    } else {
                        rolesContainer.innerHTML = '<div class="empty-state">暂无角色</div>';
                    }
                } else {
                    if (result.code === 4001) {
                        localStorage.clear();
                        window.location.href = '/demo/login.html';
                    }
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
            }
        }

        async function fetchPermissions() {
            try {
                const response = await fetch('http://localhost:3000/api/permissions/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const result = await response.json();

                if (result.code === 0) {
                    const permissionsContainer = document.getElementById('permissionsContainer');

                    if (result.data.permissions && result.data.permissions.length > 0) {
                        permissionsContainer.innerHTML = `
                            <div class="permission-list">
                                ${result.data.permissions.map(perm =>
                                    `<div class="permission-item">${perm}</div>`
                                ).join('')}
                            </div>
                        `;
                    } else {
                        permissionsContainer.innerHTML = '<div class="empty-state">暂无权限</div>';
                    }
                }
            } catch (error) {
                console.error('获取权限失败:', error);
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/demo/login.html';
        }

        // 加载数据
        fetchUserInfo();
        fetchPermissions();
    </script>
</body>
</html>
